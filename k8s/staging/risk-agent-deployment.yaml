apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-agent
  template:
    metadata:
      labels:
        app: risk-agent
    spec:
      containers:
        - name: risk-agent
          image: gcr.io/cloudshell-images/cloudshell-dev
          ports:
            - containerPort: 8081
