apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-agent
  template:
    metadata:
      labels:
        app: risk-agent
    spec:
      containers:
      - name: risk-agent
        image: us-central1-docker.pkg.dev/oracle69-website/bank-of-anthos-repo/cloudshell-staging:v0.6.7
        ports:
        - containerPort: 8081
