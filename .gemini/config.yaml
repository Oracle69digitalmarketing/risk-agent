#
# Gemini Code Assist Configuration for Oracle69 Digital Marketing
#
# This file centralizes our AI-powered development standards.
#
# Last updated: 2025-08-19

# Specifies the schema for validation
$schema: "http://json-schema.org/draft-07/schema#"

# Global settings for Gemini
have_fun: false

# A list of glob patterns for files and directories that Gemini Code Assist should ignore.
# Files matching any pattern in this list will be skipped during interactions.
ignore_patterns:
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - "public/**"
  - "vendor/**"
  - "**.log"
  - "**test/fixtures/**"
  - "**.min.js"
  - "**.wasm"
  - "**/__generated__/**"  # e.g., auto-generated API clients
  - "**/migrations/**"     # e.g., database schema changes
  - "**/*.spec.ts"         # Exclude test files from code review focus
  - "**/*.test.js"         # Exclude test files from code review focus

# Configuration for code reviews
code_review:
  # Disables Gemini from acting on pull requests
  disable: false
  
  # The minimum severity of review comments to consider.
  # Options: LOW, MEDIUM, HIGH, CRITICAL.
  comment_severity_threshold: HIGH
  
  # The maximum number of review comments to consider. Use -1 for unlimited.
  max_review_comments: 10
  
  # Configuration for pull request opened events
  pull_request_opened:
    # Posts a help message on pull request open.
    help: false
    
    # Posts a pull request summary on the pull request open.
    summary: true
    
    # Posts a code review on pull request open.
    code_review: true

$schema: "http://json-schema.org/draft-07/schema#"
title: RepoConfig
description: Configuration for Gemini Code Assist on a repository. All fields are optional and have default values.
type: object
properties:
  have_fun:
    type: boolean
    description: Enables fun features such as a poem in the initial pull request summary. Default: false.
  ignore_patterns:
    type: array
    items:
      type: string
    description: A list of glob patterns for files and directories that Gemini Code Assist should ignore. Files matching any pattern in this list will be skipped during interactions. Default: [].
  code_review:
    type: object
    description: Configuration for code reviews. All fields are optional and have default values.
    properties:
      disable:
        type: boolean
        description: Disables Gemini from acting on pull requests. Default: false.
      comment_severity_threshold:
        type: string
        enum:
          - LOW
          - MEDIUM
          - HIGH
          - CRITICAL
        description: The minimum severity of review comments to consider. Default: MEDIUM.
      max_review_comments:
        type: integer
        format: int64
        description: The maximum number of review comments to consider. Use -1 for unlimited. Default: -1.
      pull_request_opened:
        type: object
        description: Configuration for pull request opened events. All fields are optional and have default values.
        properties:
          help:
            type: boolean
            description: Posts a help message on pull request open. Default: false.
          summary:
            type: boolean
            description: Posts a pull request summary on the pull request open. Default: true.
          code_review:
            type: boolean
            description: Posts a code review on pull request open. Default: true.